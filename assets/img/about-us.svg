<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img"
  aria-labelledby="title desc">
  <title id="title">About ESOLTECH</title>
  <desc id="desc">A modern illustration of an IT team collaborating with cloud, security, and infrastructure icons.</desc>

  <defs>
    <linearGradient id="g-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ce1212" stop-opacity="0.95" />
      <stop offset="1" stop-color="#ff4d4d" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="g-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f3f5f7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.18" />
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <!-- Background blobs -->
  <g opacity="0.9">
    <path
      d="M226,232c93,-108 287,-118 412,-55c128,64 165,234 90,352c-76,120 -205,164 -332,151c-127,-13 -290,-139 -265,-286c9,-56 44,-114 95,-162z"
      fill="#ce1212" opacity="0.10" />
    <path
      d="M804,188c116,20 195,108 206,214c12,113 -54,206 -154,261c-97,54 -216,72 -312,18c-100,-56 -176,-175 -126,-289c49,-110 267,-230 386,-204z"
      fill="#111827" opacity="0.06" />
    <ellipse cx="875" cy="708" rx="300" ry="56" fill="#ce1212" opacity="0.09" filter="url(#soft)" />
  </g>

  <!-- Main card -->
  <g filter="url(#shadow)">
    <rect x="160" y="170" width="880" height="560" rx="28" fill="url(#g-soft)" />
    <rect x="160" y="170" width="880" height="560" rx="28" fill="#ffffff" opacity="0.35" />
  </g>

  <!-- Top accent bar -->
  <rect x="188" y="196" width="824" height="10" rx="5" fill="url(#g-accent)" opacity="0.85" />

  <!-- Left: team -->
  <g transform="translate(255 260)">
    <!-- Desk -->
    <rect x="10" y="330" width="410" height="34" rx="16" fill="#111827" opacity="0.10" />
    <rect x="40" y="250" width="360" height="92" rx="18" fill="#0b1220" opacity="0.08" />

    <!-- Laptop -->
    <rect x="154" y="226" width="152" height="92" rx="10" fill="#0b1220" opacity="0.14" />
    <rect x="166" y="238" width="128" height="68" rx="8" fill="#ffffff" opacity="0.88" />
    <rect x="136" y="318" width="188" height="16" rx="8" fill="#0b1220" opacity="0.18" />

    <!-- Person 1 -->
    <g transform="translate(50 35)">
      <circle cx="62" cy="52" r="34" fill="#ffd2b3" />
      <path d="M26,148c10,-44 36,-70 72,-70c36,0 62,26 72,70c3,13 -7,26 -20,26H46c-13,0 -23,-13 -20,-26z"
        fill="#1f2937" opacity="0.18" />
      <path d="M22,142c14,-36 39,-56 76,-56c37,0 62,20 76,56c4,10 -4,22 -15,22H37c-11,0 -19,-12 -15,-22z"
        fill="#ce1212" opacity="0.88" />
      <path d="M38,52c7,-30 30,-48 58,-48c31,0 55,19 60,52c-10,-10 -22,-14 -34,-16c-25,-4 -48,2 -84,12z"
        fill="#111827" opacity="0.55" />
      <circle cx="48" cy="58" r="3" fill="#111827" opacity="0.55" />
      <circle cx="78" cy="58" r="3" fill="#111827" opacity="0.55" />
    </g>

    <!-- Person 2 -->
    <g transform="translate(170 0)">
      <circle cx="62" cy="52" r="34" fill="#ffd2b3" />
      <path d="M22,142c14,-36 39,-56 76,-56c37,0 62,20 76,56c4,10 -4,22 -15,22H37c-11,0 -19,-12 -15,-22z"
        fill="#111827" opacity="0.16" />
      <path d="M26,146c12,-40 37,-64 72,-64c35,0 60,24 72,64c3,11 -5,22 -16,22H42c-11,0 -19,-11 -16,-22z"
        fill="#0b1220" opacity="0.10" />
      <path d="M25,140c12,-34 37,-52 76,-52c39,0 64,18 76,52c4,11 -4,22 -15,22H40c-11,0 -19,-11 -15,-22z"
        fill="#111827" opacity="0.14" />
      <path d="M32,46c6,-28 30,-45 60,-45c28,0 51,16 58,42c-19,-8 -38,-8 -58,-3c-24,7 -40,6 -60,6z"
        fill="#111827" opacity="0.50" />
      <path d="M64,64c18,10 36,10 54,0" stroke="#111827" stroke-opacity="0.35" stroke-width="5"
        stroke-linecap="round" fill="none" />
    </g>

    <!-- Person 3 -->
    <g transform="translate(300 45)">
      <circle cx="62" cy="52" r="34" fill="#ffd2b3" />
      <path d="M25,140c12,-34 37,-52 76,-52c39,0 64,18 76,52c4,11 -4,22 -15,22H40c-11,0 -19,-11 -15,-22z"
        fill="#ce1212" opacity="0.78" />
      <path d="M34,40c10,-26 30,-38 56,-38c26,0 46,12 56,38c-17,-6 -32,-4 -52,2c-21,6 -36,6 -60,-4z"
        fill="#111827" opacity="0.52" />
    </g>
  </g>

  <!-- Right: icons and lines -->
  <g transform="translate(690 260)">
    <!-- Heading lines -->
    <rect x="0" y="0" width="420" height="18" rx="9" fill="#111827" opacity="0.10" />
    <rect x="0" y="34" width="360" height="14" rx="7" fill="#111827" opacity="0.08" />
    <rect x="0" y="58" width="390" height="14" rx="7" fill="#111827" opacity="0.08" />

    <!-- Icon cards -->
    <g transform="translate(0 120)">
      <rect x="0" y="0" width="420" height="108" rx="18" fill="#ffffff" opacity="0.65" />
      <rect x="0" y="0" width="420" height="108" rx="18" fill="#111827" opacity="0.05" />
      <!-- Cloud -->
      <g transform="translate(26 26)">
        <circle cx="32" cy="34" r="18" fill="url(#g-accent)" opacity="0.18" />
        <path
          d="M55,44c0,-9 -7,-16 -16,-16c-3,0 -6,1 -8,2c-2,-6 -8,-10 -15,-10c-9,0 -16,7 -16,16c0,1 0,2 0,3c-7,1 -12,7 -12,14c0,8 6,14 14,14h43c9,0 16,-7 16,-16c0,-7 -3,-12 -10,-15z"
          fill="#111827" opacity="0.72" />
      </g>
      <rect x="110" y="30" width="270" height="14" rx="7" fill="#111827" opacity="0.10" />
      <rect x="110" y="54" width="240" height="12" rx="6" fill="#111827" opacity="0.08" />
      <rect x="110" y="74" width="210" height="12" rx="6" fill="#111827" opacity="0.08" />
    </g>

    <g transform="translate(0 250)">
      <rect x="0" y="0" width="420" height="108" rx="18" fill="#ffffff" opacity="0.65" />
      <rect x="0" y="0" width="420" height="108" rx="18" fill="#111827" opacity="0.05" />
      <!-- Shield -->
      <g transform="translate(30 24)">
        <path
          d="M34,0l26,10v22c0,18 -11,34 -26,42C19,66 8,50 8,32V10L34,0z"
          fill="url(#g-accent)" opacity="0.18" />
        <path
          d="M34,2l22,9v21c0,15 -9,29 -22,36C21,61 12,47 12,32V11L34,2z"
          fill="#111827" opacity="0.70" />
        <path d="M26,34l6,6l14,-16" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
          fill="none" opacity="0.95" />
      </g>
      <rect x="110" y="30" width="260" height="14" rx="7" fill="#111827" opacity="0.10" />
      <rect x="110" y="54" width="240" height="12" rx="6" fill="#111827" opacity="0.08" />
      <rect x="110" y="74" width="190" height="12" rx="6" fill="#111827" opacity="0.08" />
    </g>

    <g transform="translate(0 380)">
      <rect x="0" y="0" width="420" height="108" rx="18" fill="#ffffff" opacity="0.65" />
      <rect x="0" y="0" width="420" height="108" rx="18" fill="#111827" opacity="0.05" />
      <!-- Infrastructure -->
      <g transform="translate(26 26)">
        <rect x="6" y="8" width="62" height="18" rx="9" fill="#111827" opacity="0.70" />
        <rect x="6" y="34" width="62" height="18" rx="9" fill="#111827" opacity="0.70" />
        <rect x="6" y="60" width="62" height="18" rx="9" fill="#111827" opacity="0.70" />
        <circle cx="58" cy="17" r="3" fill="#ffffff" opacity="0.9" />
        <circle cx="58" cy="43" r="3" fill="#ffffff" opacity="0.9" />
        <circle cx="58" cy="69" r="3" fill="#ffffff" opacity="0.9" />
        <path d="M88,20h50M88,46h38M88,72h44" stroke="#111827" stroke-opacity="0.18" stroke-width="8"
          stroke-linecap="round" />
      </g>
      <rect x="110" y="30" width="280" height="14" rx="7" fill="#111827" opacity="0.10" />
      <rect x="110" y="54" width="250" height="12" rx="6" fill="#111827" opacity="0.08" />
      <rect x="110" y="74" width="220" height="12" rx="6" fill="#111827" opacity="0.08" />
    </g>
  </g>

  <!-- Corner sparkles -->
  <g opacity="0.35" fill="#ce1212">
    <path d="M980 222l10 18l18 10l-18 10l-10 18l-10-18l-18-10l18-10z" />
    <path d="M246 682l7 12l12 7l-12 7l-7 12l-7-12l-12-7l12-7z" />
  </g>
</svg>
