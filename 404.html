<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style media="screen">
      :root { --bg: #f8fafc; --text: #0f172a; --muted: #64748b; --accent: #e11d48; }
      body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, "Segoe UI", Arial, sans-serif; margin: 0; padding: 0; }
      #message { background: white; max-width: 420px; margin: 90px auto 16px; padding: 34px 28px 22px; border-radius: 18px; border: 1px solid rgba(15,23,42,0.08); }
      #message h3 { color: var(--muted); font-weight: 600; font-size: 14px; margin: 18px 0 10px; }
      #message h2 { color: var(--accent); font-weight: 800; font-size: 14px; letter-spacing: 0.16em; margin: 0 0 10px; text-transform: uppercase; }
      #message h1 { font-size: 28px; font-weight: 800; color: var(--text); margin: 0 0 14px; letter-spacing: -0.03em; }
      #message p { line-height: 150%; margin: 14px 0 18px; font-size: 14px; color: var(--muted); }
      #message a { display: block; text-align: center; background: var(--accent); text-decoration: none; color: white; padding: 14px 16px; border-radius: 999px; font-weight: 700; }
      #message, #message a { box-shadow: 0 18px 50px rgba(2,6,23,0.12); }
      #load { color: rgba(0,0,0,0.4); text-align: center; font-size: 13px; }
      @media (max-width: 600px) {
        #message { margin: 0; max-width: none; min-height: 100vh; border-radius: 0; border: 0; box-shadow: none; }
        body { background: white; }
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>Page Not Found</h1>
      <p>The specified file was not found on this website. Please check the URL for mistakes and try again.</p>
      <h3>Why am I seeing this?</h3>
      <p>This page was generated by the Firebase Command-Line Interface. To modify it, edit the <code>404.html</code> file in your project's configured <code>public</code> directory.</p>
    </div>
  </body>
</html>
